# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=healthhub-api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:healthhubdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.myproject=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSON serialization settings
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Application Info
app.name=HealthHub REST API
app.version=1.0.0
app.description=Spring Boot REST API for HealthHub patient management system
spring.h2.console.enabled=true
spring.h2.console.path=/h2